databases:
  - name: smartlearning-db
    plan: free
    postgresMajorVersion: "16"

services:
  # ---- Spring Boot backend ----
  - type: web
    name: smartlearning-backend
    runtime: docker
    dockerfilePath: ./work/SmartLearning-Backend/Dockerfile
    dockerContext: ./work/SmartLearning-Backend
    plan: free
    healthCheckPath: /swagger-ui/index.html
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false        # set manually: jdbc:postgresql://<host>:5432/<db-name>
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: FRONTEND_URL
        sync: false        # set once you know your static site URL
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false        # same as FRONTEND_URL, no trailing slash
      - key: MINIO_URL
        sync: false        # e.g. https://<accountid>.r2.cloudflarestorage.com
      - key: MINIO_PUBLIC_URL
        sync: false        # public R2/S3 URL used for presigned download links
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_REGION
        value: auto
      - key: MINIO_BUCKET_NAME
        value: smartlearning

  # ---- Angular frontend ----
  - type: web
    name: smartlearning-frontend
    runtime: static
    buildCommand: cd work/Smartlearning-Frontend && npm ci && npm run build -- --configuration production
    staticPublishPath: ./work/Smartlearning-Frontend/dist/smartlearning-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
