spring:
  application:
    name: SmartLearning

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
    default-encoding: UTF-8

server:
  port: ${PORT:8000}
  error:
    # Include exception messages in error responses so the Angular error
    # interceptor can show meaningful toasts (e.g. "Invalid invitation code")
    # instead of a generic "Something went wrong".
    include-message: always

app:
  # Base URL of the Angular portal — used to build the activation link
  # embedded in invitation emails.
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  # How long an invitation code stays valid, in days.
  invitation-expiry-days: 7
  cors:
    # Comma-separated extra origins allowed to call the API, e.g.
    # https://smartlearning-frontend.onrender.com
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  public-url: ${MINIO_PUBLIC_URL:${MINIO_URL:http://localhost:9000}}
  access-key: ${MINIO_ACCESS_KEY:admin}
  region: ${MINIO_REGION:us-east-1}
  secret-key: ${MINIO_SECRET_KEY:password123}
  bucket-name: ${MINIO_BUCKET_NAME:smartlearning}

jwt:
  # Local-dev-only fallback. In production ALWAYS set JWT_SECRET as a real env var
  # (32+ random chars) — never rely on this default outside your own machine.
  secret: ${JWT_SECRET:THIS_IS_A_SUPER_LONG_SECRET_KEY_FOR_JWT_SIGNING_2026_SHOULD_BE_AT_LEAST_32_CHARS}
  expiration: 86400000   # 1 day in ms

execution:
  workdir: /tmp/sl-exec
  timeout-seconds: 8
  compile-timeout-seconds: 20
  max-output-chars: 20000
  memory-limit-kb: 262144   # 256 MB

gemini:
  # Set via environment variable GEMINI_API_KEY (Spring maps it automatically) —
  # never commit a real key into this file. AI features quietly disable themselves
  # (with a clear message) if this is left blank. Get a free key (no credit card,
  # no expiration) at https://aistudio.google.com -> "Get API key".
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  max-tokens: 1500