<div class="mx-auto" style="max-width: 720px;">
  <h3 class="fw-bold mb-4">
    {{ isEditMode ? 'Edit announcement' : 'New announcement' }}
  </h3>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

    <div class="mb-3">
      <label class="form-label">Title</label>
      <input
        type="text"
        class="form-control"
        formControlName="title"
        [class.is-invalid]="submitted && form.controls.title.invalid"
      />
      <div class="invalid-feedback">Title is required.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea
        class="form-control"
        rows="5"
        formControlName="body"
        [class.is-invalid]="submitted && form.controls.body.invalid"
      ></textarea>
      <div class="invalid-feedback">Message is required.</div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Priority</label>
        <select class="form-select" formControlName="priority">
          <option value="LOW">Low</option>
          <option value="NORMAL">Normal</option>
          <option value="HIGH">High</option>
          <option value="URGENT">Urgent</option>
        </select>
      </div>

      @if (!isEditMode) {
        <div class="col-md-6 mb-3">
          <label class="form-label">Scope</label>
          <select class="form-select" formControlName="courseId">
            @if (auth.hasAnyRole('ADMIN', 'MASTER')) {
              <option value="">Sitewide (everyone)</option>
            }
            @for (c of courses; track c.id) {
              <option [value]="c.id">{{ c.courseCode }} — {{ c.title }}</option>
            }
          </select>
        </div>
      }
    </div>

    <div class="mb-3">
      <label class="form-label">Expires at <span class="text-muted">(optional)</span></label>
      <input type="datetime-local" class="form-control" formControlName="expiresAt" />
      <div class="form-text">Students won't see this announcement after this time.</div>
    </div>

    <div class="form-check mb-4">
      <input class="form-check-input" type="checkbox" formControlName="published" id="publishedCheck" />
      <label class="form-check-label" for="publishedCheck">Publish immediately</label>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        @if (saving) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        {{ isEditMode ? 'Save changes' : 'Post announcement' }}
      </button>
      <a routerLink="/announcements" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
