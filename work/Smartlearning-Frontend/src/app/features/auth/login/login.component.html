<div class="d-flex justify-content-center align-items-center auth-wrap">
  <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-mark mx-auto mb-3">
          <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h1 class="h3 mb-1">Welcome back</h1>
        <p class="text-muted mb-0">Sign in to SmartLearning</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="you@university.edu"
            [class.is-invalid]="submitted && form.controls.email.invalid"
          />
          @if (submitted && form.controls.email.invalid) {
            <div class="invalid-feedback">Enter a valid email address.</div>
          }
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" for="password">Password</label>
          <div class="input-group">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              class="form-control"
              formControlName="password"
              placeholder="••••••••"
              [class.is-invalid]="submitted && form.controls.password.invalid"
            />
            <button class="btn btn-outline-secondary" type="button" (click)="showPassword = !showPassword">
              <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
          @if (submitted && form.controls.password.invalid) {
            <div class="text-danger small mt-1">Password is required.</div>
          }
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-semibold" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Sign in
        </button>
      </form>

      <p class="text-center text-muted mt-4 mb-0">
        Don't have an account?
        <a routerLink="/register" class="text-sky fw-semibold">Create one</a>
      </p>
    </div>
  </div>
</div>
